<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚安小雞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            padding-bottom: 120px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .intro {
            color: white;
            font-size: 20px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.6;
            opacity: 0.95;
        }

        .video-container {
            width: 100%;
            max-width: 700px;
            margin-bottom: 40px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        /* 底部按鈕 - 固定定位 */
        .sticky-button {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .action-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            max-width: 400px;
            width: 100%;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .action-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .action-button:active {
            transform: translateY(-1px);
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .intro {
                font-size: 16px;
            }

            .action-button {
                padding: 16px 40px;
                font-size: 16px;
            }

            .container {
                padding: 30px 15px;
                padding-bottom: 110px;
            }

            .sticky-button {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>晚安小雞</h1>
        <p class="intro">藏傳佛教</p>

        <div class="video-container">
            <video controls autoplay muted playsinline>
                <source src="803304529.071929.mp4" type="video/mp4">
                
            </video>
        </div>
    </div>

    <div class="sticky-button">
        <a href="https://jambolive.tv/shop/6529/product/" class="action-button">立即下單</a>
    </div>
</body>
</html>
